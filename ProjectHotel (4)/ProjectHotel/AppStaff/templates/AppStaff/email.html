<!DOCTYPE html>
{% load static %}
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #2e1c0d;
            color: #ffffff;
            padding: 10px;
            text-align: center;
        }
        .content {
            background-color: #f9f9f9;
            padding: 10px;
            border: 1px solid #ddd;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: 20px;
        }
        .img{
            width: 100px;
            height: auto;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="header"><p>
        <img src="https://storage.googleapis.com/sso-avatars-prod/avatars/frjcnq1MINS4RFN5xpLJwDNsZw3UpVolnX1VEAot.jpg" alt="blissfulstay.img" class="img">
    </p></div>
    
    <div class="content">
        <p>Poštovani/a, {{ name }}</p>
        
        <p>Hvala vam što ste nas kontaktirali. Ovo je odgovor na vaš upit:</p>
        <br>
        
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
        
        <div style="background-color: white; padding: 15px; border-left: 4px solid #2e1c0d;">
            {{ message_body|linebreaks }}
        </div>
        
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
        
        <p>Ako imate dodatnih pitanja, slobodno nam se nemojte obratiti.</p>
        
        <p>Srdačan pozdrav,<br>
        Blissful Stay</p>
    </div>
    
    <div class="footer">
        <p>&copy; 2026 Blissful Stay. Sva prava jedva izdržana.</p>
    </div>
</body>
</html>
